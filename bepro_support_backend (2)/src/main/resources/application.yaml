spring:
  application:
    name: bepro_support_backend

  datasource:
    url: jdbc:h2:mem:support;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  h2:
    console:
      enabled: true

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.H2Dialect

  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 200MB
  web:
    resources:
      add-mappings: true


server:
  port: 8080

logging:
  level:
    com.example.service.MyService: DEBUG
    root: DEBUG
    org.springframework: DEBUG
    org.springframework.security: DEBUG


app:
  upload-dir: uploads


